name: Build Flet APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Java Kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kutuphaneleri Kur
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Flet Icin Dosya Adini Duzelt
        run: |
          mv mobil_stga.py main.py

      - name: APK Derlemeyi Baslat
        run: |
          flet build apk

      - name: APK Dosyasini Sisteme Yukle
        uses: actions/upload-artifact@v4
        with:
          name: STGA-Mobil-Uygulamasi
          path: build/apk/*.apk
